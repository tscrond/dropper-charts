name: Helm Chart Release

on:
  workflow_call:
    inputs:
      charts_dir:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1

      - name: Login to GHCR
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package ${{ inputs.charts_dir }}

      - name: Push chart to OCI
        run: helm push ${{ inputs.charts_dir }}/*.tgz oci://ghcr.io/org/dropper-charts