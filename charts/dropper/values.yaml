images:
  backend: dropper-backend:1.0.4
  frontend: dropper-frontend:1.0.4

appName: "dropper"
replicas: 1
labels: {}
# here specify:
# podDisruptionBudget:
#   minAvailable: <your_number>
# or
# podDisruptionBudget:
#   maxUnavailable: <your_number>
podDisruptionBudget:
  maxUnavailable: {}
  minAvailable: {}

ingress:
  ingressClassName: haproxy
  annotations: {}
  tls:
    secretName: "__CHANGE_ME__"
  hosts:
    - hostname: "__CHANGE_ME__"
      serviceName: "__CHANGE_ME__"
      servicePort: "__CHANGE_ME__"

secrets:
  dbSecretName: "__CHANGE_ME__"
  gcsSecretName: "__CHANGE_ME__"
  googleSecretName: "__CHANGE_ME__"
  smtpSecretName: "__CHANGE_ME__"
